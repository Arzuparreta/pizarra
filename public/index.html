<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizarra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #e8e8e8; font: 14px/1.4 sans-serif; }
    #app {
      display: flex;
      height: 100%;
    }
    #sidebar {
      position: relative;
      z-index: 1;
      width: 180px;
      padding: 12px;
      background: #ddd;
      border-right: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #sidebar-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    #sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }
    #add-board-btn {
      width: 24px;
      height: 24px;
      padding: 0;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #f7f7f7;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #add-board-btn:hover { background: #eee; }
    #board-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
      overflow: auto;
    }
    .board-card {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #bbb;
      background: #f7f7f7;
      font: 14px/1.3 sans-serif;
    }
    .board-card:hover { background: #eee; }
    .board-card-name {
      flex: 1;
      min-width: 0;
      text-align: left;
      cursor: pointer;
      border: none;
      background: none;
      font: inherit;
      padding: 2px 0;
    }
    .board-card-name:focus { outline: none; }
    .board-card-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }
    .board-card-actions button {
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
    }
    .board-card-actions button:hover { background: #ddd; color: #333; }
    .board-card-actions button.delete:hover { background: #ffe0e0; color: #c00; }
    #main {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #toolbar {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #e0e0e0;
      border-bottom: 1px solid #ccc;
    }
    .btn {
      border-radius: 4px;
      border: 1px solid #bbb;
      background: #f7f7f7;
      cursor: pointer;
      padding: 6px 10px;
      font: 14px/1.4 sans-serif;
    }
    .btn:hover { background: #eee; }
    #save-msg {
      color: #363;
      font-size: 13px;
    }
    #board {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #canvas {
      position: absolute;
      inset: 0;
    }
    #empty-hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font: 18px/1.5 sans-serif;
      text-align: center;
      pointer-events: none;
    }
    #wipe-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 10;
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      border: 1px solid #a00;
      background: #f7f7f7;
      cursor: pointer;
    }
    #wipe-btn:hover { background: #ffe0e0; }
    #trash {
      position: absolute;
      bottom: 12px;
      right: 56px;
      z-index: 10;
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      border-radius: 4px;
      border: 1px solid #bbb;
      background: #f7f7f7;
    }
    #trash:hover { background: #eee; }
    .board-item {
      position: absolute;
      cursor: move;
      user-select: none;
    }
    .board-item img {
      display: block;
      max-width: 300px;
      max-height: 300px;
      pointer-events: none;
    }
    .board-item.text-block {
      padding: 8px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      max-width: 280px;
      max-height: 200px;
      overflow: auto;
      white-space: pre-wrap;
      font: 14px/1.4 sans-serif;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h2>Boards</h2>
        <button type="button" id="add-board-btn" aria-label="Add board">+</button>
      </div>
      <div id="board-list"></div>
    </aside>
    <main id="main">
      <div id="toolbar">
        <button type="button" id="save-board" class="btn">Save</button>
        <span id="save-msg" hidden></span>
      </div>
      <div id="board">
        <div id="canvas">
          <p id="empty-hint">Open a board or create one, then drop images or text here</p>
        </div>
        <div id="trash" class="btn" title="Drag items here to delete" aria-label="Trash">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </div>
        <button type="button" id="wipe-btn" class="btn" title="Wipe board" aria-label="Wipe board">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </main>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
