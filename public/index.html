<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizarra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #e8e8e8; }
    #board {
      position: relative;
      width: 100%;
      height: 100%;
      background: #e8e8e8;
    }
    #empty-hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font: 18px/1.5 sans-serif;
      text-align: center;
      pointer-events: none;
    }
    #toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 10;
      font: 14px/1.4 sans-serif;
    }
    #toolbar button {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #bbb;
      background: #f7f7f7;
      cursor: pointer;
    }
    #toolbar button:hover {
      background: #eee;
    }
    #trash {
      position: absolute;
      bottom: 56px;
      right: 12px;
      z-index: 10;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      border: 1px solid #bbb;
      background: #f7f7f7;
      cursor: default;
    }
    #trash:hover {
      background: #eee;
    }
    #wipe-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 10;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid #b00;
      background: #c00;
      color: #fff;
      font: 14px/1.4 sans-serif;
      cursor: pointer;
    }
    #wipe-btn:hover {
      background: #a00;
    }
    .board-item {
      position: absolute;
      cursor: move;
      user-select: none;
    }
    .board-item img {
      display: block;
      max-width: 300px;
      max-height: 300px;
      pointer-events: none;
    }
    .board-item.text-block {
      padding: 8px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      max-width: 280px;
      max-height: 200px;
      overflow: auto;
      white-space: pre-wrap;
      font: 14px/1.4 sans-serif;
    }
  </style>
</head>
<body>
  <div id="board">
    <div id="toolbar">
      <button id="save-board">Save board</button>
      <button id="open-board">Open board</button>
      <input id="open-board-input" type="file" accept=".pizarra" style="display: none;">
    </div>
    <p id="empty-hint">Pizarra<br><small>Drop images or text files here</small></p>
    <div id="trash" title="Drag items here to delete" aria-label="Trash">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        <line x1="10" y1="11" x2="10" y2="17"></line>
        <line x1="14" y1="11" x2="14" y2="17"></line>
      </svg>
    </div>
    <button id="wipe-btn" type="button">Wipe</button>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
